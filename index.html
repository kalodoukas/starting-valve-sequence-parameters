<title>Starting Valve Sequence</title>

<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
  margin:0; padding:16px; text-align:center; font-family:Arial,Helvetica,sans-serif; background:#fff;
}
.controls, .params { margin-bottom:10px; display:flex; justify-content:center; align-items:center; gap:8px; flex-wrap:wrap; }
button {
  margin:5px; padding:12px 16px; min-width:56px; font-size:16px;
  border:1px solid #000; background:#fff; -webkit-appearance:none; appearance:none;
  touch-action:manipulation; user-select:none; -webkit-user-select:none;
}
.readout { display:inline-block; min-width:90px; font-weight:bold; }
.stage {
  position:relative; width:min(92vw,700px); aspect-ratio:1/1; margin:0 auto;
}
.layer, #innerWrap {
  position:absolute; inset:0;
}
.layer svg, #innerWrap svg {
  width:100%; height:100%; display:block;
}
#innerWrap {
  transform-origin:50% 50%;
  will-change:transform;
}

input, select {
  padding:8px; font-size:14px; border:1px solid #000; border-radius:0; background:#fff;
}
label { font-size:14px; }
</style>

<div class="params">

      <option value="9">9</option>
      <option value="10">10</option>
      <option value="11">11</option>
      <option value="12">12</option>

  <label>Firing order:

  </label>
  <button id="applyBtn">Apply</button>
</div>

<div class="controls">
  <button id="ffBtn">FF</button>
  <button id="sfBtn">SF</button>
  <span id="ang" class="readout">0°</span>

</div>

<script>
var angle = 0, delayTimer = null, repeatTimer = null, touchMode = false;

function render() {
  var el = document.getElementById('innerWrap');
  el.style.transform = 'rotate(' + angle + 'deg)';
  document.getElementById('ang').textContent = (((angle % 360) + 360) % 360) + '°';
}

function step(delta) {
  angle += delta;
  render();
}

function clearAll() {
  if (delayTimer) clearTimeout(delayTimer);
  if (repeatTimer) clearInterval(repeatTimer);
  delayTimer = null;
  repeatTimer = null;
}

function startPress(delta, speed, e) {
  if (e) e.preventDefault();
  clearAll();
  touchMode = !!(e && e.type && e.type.indexOf('touch') === 0);
  step(delta);
  delayTimer = setTimeout(function() {
    repeatTimer = setInterval(function() { step(delta); }, speed);
  }, 250);
  return false;
}

function stopPress(e) {
  if (e) e.preventDefault();
  clearAll();
  setTimeout(function() { touchMode = false; }, 50);
  return false;
}

function clickStep(delta, e) {
  if (e) e.preventDefault();
  if (touchMode) return false;
  step(delta);
  return false;
}

function bind(id, delta, speed) {
  var b = document.getElementById(id);
  b.onclick = function(e) { return clickStep(delta, e); };
  b.onmousedown = function(e) { return startPress(delta, speed, e); };
  b.onmouseup = stopPress;
  b.onmouseleave = stopPress;
  b.ontouchstart = function(e) { return startPress(delta, speed, e); };
  b.ontouchend = stopPress;
  b.ontouchcancel = stopPress;
}

bind('ffBtn', 1, 40);
bind('sfBtn', 1, 80);
bind('saBtn', -1, 80);
bind('faBtn', -1, 40);
render();

var SVG_NS = "http://www.w3.org/2000/svg";

function polarPoint(r, d) {
  var t = d * Math.PI / 180;
  return { x: 350 + r * Math.sin(t), y: 350 - r * Math.cos(t) };
}

function drawFiringOrder() {
  var n = parseInt(document.getElementById('cylinders').value, 10);
  var raw = document.getElementById('firingOrder').value.trim();
  var order = raw.split(/[ ,\-]+/).filter(Boolean);
  var layer = document.getElementById('firingOrderLayer');

  if (!layer) return;
  while (layer.firstChild) layer.removeChild(layer.firstChild);

  if (order.length !== n) {
    alert("The firing order must contain exactly " + n + " cylinder numbers.");
    return;
  }

  for (var i = 0; i < n; i++) {
    var d = i * 360 / n;
    var p = polarPoint(295, d);
    var text = document.createElementNS(SVG_NS, "text");
    text.setAttribute("x", p.x.toFixed(2));
    text.setAttribute("y", p.y.toFixed(2));
    text.setAttribute("font-size", "16");
    text.setAttribute("font-weight", "bold");
    text.setAttribute("text-anchor", "middle");
    text.setAttribute("dominant-baseline", "middle");
    text.textContent = order[i];
    layer.appendChild(text);
  }
}

document.getElementById('applyBtn').onclick = drawFiringOrder;
document.getElementById('cylinders').onchange = function() {
  var n = parseInt(this.value, 10);
  var current = document.getElementById('firingOrder').value.split(/[ ,\-]+/).filter(Boolean);
  if (current.length !== n) {
    var arr = [];
    for (var i=1; i<=n; i++) arr.push(String(i));
    document.getElementById('firingOrder').value = arr.join(',');
  }
  drawFiringOrder();
};

drawFiringOrder();

</script>
